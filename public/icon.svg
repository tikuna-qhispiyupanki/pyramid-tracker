<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle pyramid silhouette in background -->
  <path d="M 256 130 L 380 380 L 132 380 Z" fill="#ff6b35" opacity="0.08"/>

  <!-- Stylized 'P' (Bebas Neue inspired - tall, condensed, bold) -->
  <g fill="url(#p)">
    <!-- Vertical bar of P -->
    <rect x="155" y="120" width="58" height="280" rx="4"/>
    <!-- Top horizontal of P -->
    <path d="M 213 120 L 320 120 Q 380 120 380 175 L 380 215 Q 380 270 320 270 L 213 270 Z M 213 178 L 313 178 Q 322 178 322 195 L 322 195 Q 322 212 313 212 L 213 212 Z"/>
  </g>

  <!-- Small accent dot -->
  <circle cx="184" cy="420" r="10" fill="#ff6b35"/>
</svg>
